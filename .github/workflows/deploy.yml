name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production --base-href /${{ github.event.repository.name }}/ --output-path dist/${{ github.event.repository.name }}

      - name: Resolve deploy directory
        id: resolve
        shell: bash
        run: |
          REPO_DIR="dist/${{ github.event.repository.name }}"
          if [ -f "$REPO_DIR/browser/index.html" ]; then
            OUT_DIR="$REPO_DIR/browser"
          elif [ -f "$REPO_DIR/index.html" ]; then
            OUT_DIR="$REPO_DIR"
          else
            OUT_DIR="$(find dist -type f -name index.html -printf '%h\n' | head -n 1)"
          fi

          if [ -z "$OUT_DIR" ] || [ ! -f "$OUT_DIR/index.html" ]; then
            echo "Could not find built index.html under dist/."
            find dist -maxdepth 4 -type f | sort
            exit 1
          fi

          echo "Resolved deploy directory: $OUT_DIR"
          ls -la "$OUT_DIR"
          cp "$OUT_DIR/index.html" "$OUT_DIR/404.html"
          echo "out_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.resolve.outputs.out_dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
